apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-debug
  namespace: goconnect
  labels:
    app: gateway-debug
    purpose: debugging
spec:
  replicas: 1  # Keep at 1 for predictable debugging
  selector:
    matchLabels:
      app: gateway-debug
  template:
    metadata:
      labels:
        app: gateway-debug
    spec:
      nodeSelector:
        node-role: services
      containers:
      - name: gateway
        image: goconnect-gateway:debug
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 40000
          name: debug
        env:
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: database-host
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: database-port
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: database-name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: database-user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: database-password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: redis-port
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: jwt-secret
        - name: JWT_ACCESS_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: jwt-access-expiry
        - name: JWT_REFRESH_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: jwt-refresh-expiry
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: google-client-secret
        - name: FACEBOOK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: facebook-client-id
        - name: FACEBOOK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: facebook-client-secret
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: github-client-id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: github-client-secret
        - name: GOOGLE_REDIRECT_URL
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: google-redirect-url
        - name: FACEBOOK_REDIRECT_URL
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: facebook-redirect-url
        - name: GITHUB_REDIRECT_URL
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: github-redirect-url
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: environment
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: log-level
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goconnect-secrets
              key: redis-password
        - name: GATEWAY_PORT
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: gateway-port
        - name: AUTH_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: auth-service-host
        - name: AUTH_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: auth-service-port
        - name: SERVER_HOST
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: server-host
        - name: SERVER_PORT
          valueFrom:
            configMapKeyRef:
              name: goconnect-config
              key: server-port
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          capabilities:
            add:
            - SYS_PTRACE
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-debug-service
  namespace: goconnect
spec:
  type: NodePort
  selector:
    app: gateway-debug
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30081
  - name: debug
    protocol: TCP
    port: 40000
    targetPort: 40000
    nodePort: 30040

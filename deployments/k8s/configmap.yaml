apiVersion: v1
kind: ConfigMap
metadata:
  name: goconnect-config
  namespace: goconnect
data:
  jwt-access-expiry: "15m"
  jwt-refresh-expiry: "168h"
  otp-expiry: "5m"
  otp-length: "6"
  otp-max-verify-attempts: "5"
  otp-max-resend-attempts: "3"
  otp-resend-cooldown: "1m"
  otp-block-duration: "15m"
  google-redirect-url: "http://localhost:8080/api/auth/callback/google"
  facebook-redirect-url: "http://localhost:8080/api/auth/callback/facebook"
  github-redirect-url: "http://localhost:8080/api/auth/callback/github"
  gateway-port: "8080"
  auth-service-host: "auth-service"
  auth-service-port: "50051"
  rate-limit-registration-ip: "5"
  rate-limit-registration-email: "3"
  rate-limit-username-check: "10"
  pending-registration-ttl: "15m"
  unverified-user-cleanup-ttl: "24h"
  db-max-open-conns: "25"
  db-max-idle-conns: "10"
  db-conn-max-lifetime: "5m"
  db-conn-max-idle-time: "10m"
  server-host: "0.0.0.0"
  server-port: "8080"
  retry-max-retries: "3"
  retry-initial-backoff: "100ms"
  retry-max-backoff: "5s"
  environment: "production"
  log-level: "info"

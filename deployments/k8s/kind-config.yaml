kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: goconnect
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  - containerPort: 30443
    hostPort: 8443
    protocol: TCP
  - containerPort: 30432
    hostPort: 5432
    protocol: TCP
  - containerPort: 30379
    hostPort: 6379
    protocol: TCP

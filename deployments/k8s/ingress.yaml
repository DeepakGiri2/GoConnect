apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goconnect-ingress
  namespace: goconnect
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80

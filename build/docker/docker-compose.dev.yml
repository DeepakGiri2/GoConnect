services:
  postgres:
    image: postgres:18-alpine
    container_name: goconnect-postgres
    env_file:
      - ../../.env.local
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-goconnect}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../pkg/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goconnect-redis
    env_file:
      - ../../.env.local
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.auth
    container_name: goconnect-auth
    env_file:
      - ../../.env.local
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.gateway
    container_name: goconnect-gateway
    env_file:
      - ../../.env.local
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 50051
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
    restart: unless-stopped

  dev-frontend:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.dev-frontend
    container_name: goconnect-dev-frontend
    env_file:
      - ../../.env.local
    environment:
      DEV_SERVER_PORT: 3000
    ports:
      - "${DEV_SERVER_PORT:-3000}:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
